# CotEditor Syntax Definition for Twig
# Compatible with CotEditor 2.x and later (YAML format)
# Install: Double-click this file or drag it into CotEditor's Syntax preferences

metadata:
  author: Antigravity / CotEditor Community
  distributionURL: https://coteditor.com
  lastModified: '2026-03-10'
  license: MIT
  version: 1.0.0

kind: markup

extensions:
- keyString: twig
- keyString: html.twig

filenames: []
interpreters: []

# ─── Comment Delimiters ───────────────────────────────────────────────────────

commentDelimiters:
  beginDelimiter: '{#'
  endDelimiter: '#}'

# ─── Comments {# ... #} ───────────────────────────────────────────────────────

comments:
- beginString: '{#'
  endString: '#}'

# ─── Strings ──────────────────────────────────────────────────────────────────

strings:
- beginString: '"'
  endString: '"'
- beginString: "'"
  endString: "'"

# ─── Numbers ──────────────────────────────────────────────────────────────────

numbers:
- beginString: '(?<=[\s,\[({|=:~])-?\d+(?:\.\d+)?(?=[\s,\])}|])'
  regularExpression: true

# ─── Keywords — Twig block/control tags {% ... %} ────────────────────────────
# These are highlighted as "keywords" (control flow tags).

keywords:
# Tag delimiters — the %} and %- %} and {%- openings
- beginString: '{%-?'
  regularExpression: true
- beginString: '-?%}'
  regularExpression: true

# Block tags (opening)
- beginString: '(?<={%-?\s*)\b(if|elseif|else|endif)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(for|endfor)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(block|endblock)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(extends|include|embed|endembed)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(macro|endmacro|from|import)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(set|endset)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(with|endwith)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(apply|endapply)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(autoescape|endautoescape)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(flush)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(sandbox|endsandbox)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(spaceless|endspaceless)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(verbatim|endverbatim)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(cache|endcache)\b'
  regularExpression: true
- beginString: '(?<={%-?\s*)\b(deprecated|do|use|form_theme)\b'
  regularExpression: true

# Output delimiters {{ and }}
- beginString: '\{\{-?'
  regularExpression: true
- beginString: '-?\}\}'
  regularExpression: true

# ─── Types — Twig operators and special values ────────────────────────────────

types:
# Logical operators
- beginString: '\b(and|or|not|in|is)\b'
  regularExpression: true
# Comparison operators
- beginString: '\b(starts with|ends with|matches)\b'
  regularExpression: true
# Special values
- beginString: '\b(true|false|null|none)\b'
  ignoreCase: true
  regularExpression: true
# Loop variable
- beginString: '\bloop\b'
  regularExpression: true

# ─── Attributes — Twig built-in filters ──────────────────────────────────────

attributes:
# Core filters (used after pipe |)
- beginString: '(?<=\|)\s*(abs|batch|capitalize|column|convert_encoding|country_name|currency_name|currency_symbol|data_uri|date|date_modify|default|e|escape|filter|first|format|format_currency|format_date|format_datetime|format_number|format_time|html_to_markdown|inky_to_html|inline_css|join|json_encode|keys|language_name|last|length|locale_name|lower|map|markdown|markdown_to_html|merge|nl2br|number_format|raw|reduce|replace|reverse|round|slice|sort|spaceless|split|striptags|timezone_name|title|trim|u|upper|url_encode)\b'
  regularExpression: true

# ─── Commands — Twig built-in functions ──────────────────────────────────────

commands:
# Built-in functions
- beginString: '\b(attribute|block|constant|cycle|date|dump|html_classes|include|max|min|parent|random|range|source|template_from_string)\s*(?=\()'
  regularExpression: true
# Tests (used with "is")
- beginString: '\b(defined|divisible by|empty|even|iterable|null|none|odd|same as|sequence)\b'
  regularExpression: true
# Drupal/Symfony extras
- beginString: '\b(path|url|render|trans|t|asset|csrf_token|controller|absolute_url|relative_path|form|form_widget|form_label|form_errors|form_row|form_rest|form_start|form_end|field_label|field_value|field_name|field_description|field_type)\s*(?=[\(\|])'
  regularExpression: true

# ─── Variables — Twig special variables ──────────────────────────────────────

variables:
- beginString: '_context|_charset|app\b'
  regularExpression: true
- beginString: '\bloop\.(index|index0|revindex|revindex0|first|last|length|parent)\b'
  regularExpression: true

# ─── Characters — operators and punctuation ───────────────────────────────────

characters:
# Arithmetic operators
- beginString: '(?<=[\s\d])([+\-*/%]|\/\/|\*\*)(?=[\s\d(])'
  regularExpression: true
# String concat
- beginString: '~'
# Range operator
- beginString: '\.\.'
  regularExpression: true
# Ternary / null coalescing
- beginString: '\?:?'
  regularExpression: true
# Dot / attribute access
- beginString: '(?<=\w)\.(?=\w)'
  regularExpression: true
# Pipe filter separator
- beginString: '\|(?=[a-z_])'
  regularExpression: true

# ─── Outline — blocks and macros ─────────────────────────────────────────────

outlineMenu:
- beginString: '\{%-?\s*block\s+(\w+)\s*-?%\}'
  regularExpression: true
  keyString: 'block: $1'
  description: Twig block
- beginString: '\{%-?\s*macro\s+(\w+)\s*\('
  regularExpression: true
  keyString: 'macro: $1'
  description: Twig macro

# ─── Completions ─────────────────────────────────────────────────────────────

