kind: code
metadata:
  author: Antigravity
  distributionURL: https://github.com/betarobot/coteditor-twig-syntax
  lastModified: '2026-03-10'
  license: MIT
  version: 1.3.0
numbers:
- beginString: '\b\d+(?:\.\d+)?\b'
  regularExpression: true
outlineMenu:
- beginString: '\{%-?\s*block\s+(\w+)'
  regularExpression: true
  keyString: 'block: $1'
  description: Twig block
- beginString: '\{%-?\s*macro\s+(\w+)'
  regularExpression: true
  keyString: 'macro: $1'
  description: Twig macro
strings:
- beginString: '"'
  endString: '"'
- beginString: ''''
  endString: ''''
types:
# Twig delimiters — mirrors HTML <?...?> processing instruction colour
- beginString: '{%-'
- beginString: '-%}'
- beginString: '{%'
- beginString: '%}'
- beginString: '{{-'
- beginString: '-}}'
- beginString: '{{'
- beginString: '}}'
values:
# Boolean/null literals — mirrors HTML (no equivalent, but visually distinct)
- beginString: \btrue\b
  ignoreCase: true
  regularExpression: true
- beginString: \bfalse\b
  ignoreCase: true
  regularExpression: true
- beginString: \bnull\b
  ignoreCase: true
  regularExpression: true
- beginString: \bnone\b
  ignoreCase: true
  regularExpression: true
variables:
# loop.* special variable
- beginString: \bloop\b
  regularExpression: true
